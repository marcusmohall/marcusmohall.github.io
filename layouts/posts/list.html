{{ define "main" }}
<main id="content">
  <h1>{{ .Title }}</h1>

  {{ range .RegularPagesRecursive.ByDate.Reverse }}
    <article>
      <!-- Date -->
      <p style="margin:0 0 .25rem 0; font-size:.8rem; opacity:.75;">
        {{ .Date.Format "2006-01-02" }}
      </p>

      <!-- Title with explicit font size -->
      <h2 style="margin:0 0 .75rem 0; font-size:1.8rem; line-height:1.25;">
        {{ .Title }}
      </h2>

      <!-- Full body -->
      <div>
        {{ .Content }}
      </div>
    </article>

    <hr style="border:0; border-top:1px solid #e0e0e0; margin:2rem 0;" />
  {{ end }}
</main>
{{ end }}
